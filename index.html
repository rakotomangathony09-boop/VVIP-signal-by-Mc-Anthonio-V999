<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VVIP GOLD QUANTUM - MC ANTHONIO</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root { --bg: #050505; --gold: #d4af37; --green: #00ff88; --red: #ff3333; --card: #0a0a0a; --border: #1a1a1a; --text: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .payment-card { width: 90%; max-width: 400px; padding: 25px; border: 1px solid var(--gold); border-radius: 15px; background: #0a0a0a; text-align: center; }
        .auth-input { padding: 15px; border-radius: 8px; border: 1px solid var(--gold); background: #111; color: #fff; width: 80%; margin: 15px 0; text-align: center; text-transform: uppercase; }
        .terminal { width: 92%; max-width: 500px; margin: 20px auto; border: 1px solid var(--border); padding: 20px; border-radius: 16px; background: var(--card); }
        .price-main { font-size: 50px; font-weight: 900; text-align: center; margin: 10px 0; letter-spacing: -2px; }
        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .metric-item { background: #111; padding: 10px; border-radius: 8px; border: 1px solid #222; }
        .m-label { font-size: 9px; color: #888; text-transform: uppercase; }
        .m-val { font-size: 11px; font-weight: bold; color: var(--gold); }
        #news-bar { background: rgba(255, 51, 51, 0.1); border: 1px solid var(--red); padding: 10px; border-radius: 8px; margin-bottom: 15px; display: none; }
        #signal-box { display: none; background: rgba(0, 255, 136, 0.05); border: 2px solid var(--green); padding: 15px; border-radius: 12px; margin-top: 15px; }
        .btn-copy { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: 900; width: 100%; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="payment-card">
        <h2 style="color:var(--gold)">VVIP ACCESS</h2>
        <p style="font-size:12px; color:#888;">MVOLA: 038 11 549 93</p>
        <input type="text" id="access-key" class="auth-input" placeholder="ENTREZ VOTRE CLÉ MC-">
        <button onclick="unlock()" class="btn-copy">DÉVERROUILLER LE TERMINAL</button>
    </div>
</div>

<div class="terminal">
    <div id="news-bar">
        <div style="display:flex; justify-content:space-between; font-size:12px;">
            <span style="color:var(--red); font-weight:bold;">⚠️ NEWS IMPACT</span>
            <span id="news-timer">00:00:00</span>
        </div>
        <div id="news-title" style="font-size:10px; opacity:0.7;">CHARGEMENT CALENDRIER...</div>
    </div>

    <div style="text-align:center;">
        <h3 style="color:var(--gold); margin:0; font-size:14px;">VVIP SIGNAL BY MC ANTHONIO</h3>
        <p id="mada-clock" style="font-size:10px; opacity:0.5;">ANTANANARIVO: --:--:--</p>
    </div>

    <div id="current-price" class="price-main">0000.00</div>

    <div class="metrics-grid">
        <div class="metric-item"><div class="m-label">COT (Banks)</div><div id="cot-val" class="m-val">SYNC...</div></div>
        <div class="metric-item"><div class="m-label">Sentiment Retail</div><div id="sent-val" class="m-val">SCAN...</div></div>
        <div class="metric-item"><div class="m-label">Oanda OrderBook</div><div id="oanda-val" class="m-val">FETCH...</div></div>
        <div class="metric-item"><div class="m-label">Structure SMC</div><div id="smc-val" class="m-val">WAIT...</div></div>
    </div>

    <div id="signal-box">
        <div id="sig-type" style="font-weight:900; font-size:18px; text-align:center; margin-bottom:10px;"></div>
        <div id="sig-content" style="font-family:monospace; font-size:13px; line-height:1.5;"></div>
        <button class="btn-copy" onclick="copySignal()">📋 COPIER SIGNAL SNIPER</button>
    </div>
</div>

<script>
    const SECRET_PREFIX = "MC-";
    let price = 0, activeTrade = null, wakeLock = null;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // News simulées (À mettre à jour manuellement ou via API)
    const upcomingNews = [{ name: "CPI Data Release", time: new Date("2026-03-10T15:30:00").getTime() }];

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    async function requestWakeLock() {
        try { if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); } } catch (e) {}
    }

    function unlock() {
        const key = document.getElementById('access-key').value.toUpperCase();
        if(key.startsWith(SECRET_PREFIX)) {
            if ("Notification" in window) { Notification.requestPermission(); }
            requestWakeLock();
            document.getElementById('auth-screen').style.display='none';
            init();
        } else { alert("Clé invalide."); }
    }

    async function init() {
        setInterval(async () => {
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT');
                const data = await res.json();
                price = parseFloat(data.price);
                document.getElementById('current-price').innerText = price.toFixed(2);
                document.getElementById('mada-clock').innerText = "ANTANANARIVO: " + new Date().toLocaleTimeString("fr-FR", {timeZone: "Indian/Antananarivo"});
                
                updateNewsTimer();
                if(new Date().getDay() !== 0 && new Date().getDay() !== 6) runAnalysis();
                else document.getElementById('current-price').innerText = "CLOSED";
            } catch(e) {}
        }, 2000);
    }

    function updateNewsTimer() {
        const now = new Date().getTime();
        const next = upcomingNews.find(n => n.time > now);
        if(next) {
            const diff = next.time - now;
            const h = Math.floor(diff/3600000);
            const m = Math.floor((diff%3600000)/60000);
            const s = Math.floor((diff%60000)/1000);
            document.getElementById('news-bar').style.display = 'block';
            document.getElementById('news-timer').innerText = `${h}:${m}:${s}`;
            document.getElementById('news-title').innerText = next.name;
        }
    }

    function runAnalysis() {
        const retailShort = 88; // Simulé
        const vol = price * 0.005;
        document.getElementById('cot-val').innerText = "BULLISH FLOW";
        document.getElementById('sent-val').innerText = retailShort + "% SHORT";
        document.getElementById('oanda-val').innerText = "SL HUNT @ " + (price + 4.8).toFixed(2);
        document.getElementById('smc-val').innerText = "OB DETECTED";

        if(retailShort > 80 && !activeTrade) trigger("BUY", vol);
    }

    function trigger(side, vol) {
        const proba = 98;
        const slDist = proba >= 95 ? 3.5 : 5.5;

        activeTrade = {
            type: side,
            entry: price,
            sl: side === "BUY" ? price - slDist : price + slDist,
            tp1: side === "BUY" ? price + 5.0 : price - 5.0, // 50 Pips
            tp2: side === "BUY" ? price + (vol * 1.5) : price - (vol * 1.5),
            tp3: side === "BUY" ? price + (vol * 3) : price - (vol * 3),
            proba: proba
        };

        document.getElementById('signal-box').style.display = "block";
        document.getElementById('sig-type').innerText = "🔱 " + side + " INSTITUTIONAL";
        document.getElementById('sig-type').style.color = side === "BUY" ? "var(--green)" : "var(--red)";
        document.getElementById('sig-content').innerHTML = `
            PROBABILITÉ : ${activeTrade.proba}%<br>
            ENTRY : <b>${activeTrade.entry.toFixed(2)}</b><br>
            SL : <b style="color:var(--red)">${activeTrade.sl.toFixed(2)}</b><br>
            🎯 TP1 : <b>${activeTrade.tp1.toFixed(2)}</b> (50 Pips)<br>
            🎯 TP2 : <b>${activeTrade.tp2.toFixed(2)}</b> (Volatilité)<br>
            🎯 TP3 : <b>${activeTrade.tp3.toFixed(2)}</b> (Liquidité)
        `;
        
        if (Notification.permission === "granted") {
            new Notification("🔱 SIGNAL SNIPER GOLD", { body: `${side} @ ${price}` });
        }
        const osc = audioCtx.createOscillator(); osc.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime+0.5);
    }

    function copySignal() {
        const msg = `🔱 SIGNAL MC ANTHONIO\nACTION: ${activeTrade.type}\nENTRY: ${activeTrade.entry.toFixed(2)}\nSL: ${activeTrade.sl.toFixed(2)}\nTP1: ${activeTrade.tp1.toFixed(2)}\nTP2: ${activeTrade.tp2.toFixed(2)}\nTP3: ${activeTrade.tp3.toFixed(2)}`;
        navigator.clipboard.writeText(msg); alert("Signal copié !");
    }
</script>
</body>
    </html>
